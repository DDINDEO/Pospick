spring:
  datasource:
    url: jdbc:mysql://localhost:3306/pospick?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: 1234   #MySQL 비밀번호 입력
    driver-class-name:   com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update # 자바 코드를 보고 DB 테이블을 자동으로 생성/수정
    show-sql: true     # 실행되는 SQL문을 콘솔에 보여줌
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: pospick-secret-key-must-be-at-least-32-characters-long
  expiration: 86400000 # 24시간 (밀리초)
